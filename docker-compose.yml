version: "3.9"

services:

  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: climarisk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       climarisk
      POSTGRES_USER:     climarisk
      POSTGRES_PASSWORD: climarisk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U climarisk -d climarisk"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  backend:
    build: ./backend
    container_name: climarisk_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - chroma_data:/app/data/chroma
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]    

  frontend:
    build: ./frontend
    container_name: climarisk_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: climarisk_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]


  adminer:
    image: adminer:latest
    container_name: climarisk_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
  chroma_data:
    driver: local